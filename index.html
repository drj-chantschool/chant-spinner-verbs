<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chant Spinner Verbs for Claude Code</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .container { max-width: 580px; width: 100%; }

    h1 { font-size: 1.4rem; font-weight: 600; color: #fff; margin-bottom: 0.3rem; }
    .sub { font-size: 0.85rem; color: #555; margin-bottom: 2.5rem; }

    /* options */
    .opts { display: flex; gap: 1.5rem; margin-bottom: 1.25rem; flex-wrap: wrap; }

    .opt-group { display: flex; align-items: center; gap: 0.4rem; }
    .opt-label { font-size: 0.75rem; color: #555; }

    .pill {
      font-size: 0.75rem;
      padding: 0.2rem 0.6rem;
      background: #161616;
      border: 1px solid #2a2a2a;
      border-radius: 20px;
      color: #666;
      cursor: pointer;
      transition: all 0.1s;
    }
    .pill:hover { color: #aaa; border-color: #3a3a3a; }
    .pill.on { background: #1a1730; border-color: #5b3fd4; color: #c4b5fd; }

    /* command box */
    .cmd-wrap {
      display: flex;
      align-items: stretch;
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 2rem;
    }

    .cmd {
      flex: 1;
      padding: 0.9rem 1rem;
      font-family: monospace;
      font-size: 0.82rem;
      color: #c8c8c8;
      background: transparent;
      border: none;
      outline: none;
      white-space: nowrap;
      overflow-x: auto;
    }

    .copy-btn {
      padding: 0 1.1rem;
      background: #1a1730;
      border: none;
      border-left: 1px solid #2a2a2a;
      color: #a78bfa;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
    }
    .copy-btn:hover { background: #231e40; color: #ddd3ff; }
    .copy-btn.done { background: #0d2e22; color: #6ee7b7; }

    /* verb list */
    details { margin-top: 0; }
    summary {
      font-size: 0.75rem;
      color: #444;
      cursor: pointer;
      user-select: none;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    summary::-webkit-details-marker { display: none; }
    summary::before {
      content: "▸";
      font-size: 0.65rem;
      transition: transform 0.15s;
      display: inline-block;
    }
    details[open] summary::before { transform: rotate(90deg); }
    summary:hover { color: #777; }

    .verbs-list {
      display: flex;
      flex-direction: column;
      gap: 0.22rem;
      margin-top: 0.6rem;
    }

    .verb { font-size: 0.82rem; color: #444; padding: 0.15rem 0; }
  </style>
</head>
<body>
<div class="container">
  <h1>Chant Spinner Verbs</h1>
  <p class="sub">Custom Claude Code spinner verbs for the sacred chant musician.</p>

  <div class="opts">
    <div class="opt-group">
      <span class="opt-label">Target:</span>
      <button class="pill on" data-target="">VSCode</button>
      <button class="pill" data-target="--target settings">settings.json</button>
      <button class="pill" data-target="--target local">settings.local.json</button>
    </div>
    <div class="opt-group">
      <span class="opt-label">Mode:</span>
      <button class="pill on" data-mode="">Replace defaults</button>
      <button class="pill" data-mode="--mode append">Append to defaults</button>
    </div>
  </div>

  <div class="cmd-wrap">
    <div class="cmd" id="cmd"></div>
    <button class="copy-btn" id="copyBtn">Copy</button>
  </div>

  <details>
    <summary>21 verbs included</summary>
    <div class="verbs-list" id="verbsList"></div>
  </details>
</div>

<script>
const BASE = "curl -sL https://raw.githubusercontent.com/drj-chantschool/chant-spinner-verbs/master/install.py | python3";

const VERBS = [
  "Removing the flats from all the O Antiphons",
  "Putting flats in all the O Antiphons",
  "Reading the antiphon you were supposed to be singing",
  "Singing the diamond notes too quickly",
  "Singing the diamond notes too slowly",
  "Singing the diamond notes at the right speed",
  "Arguing with the ccwatershed guy about how to sing the diamond notes",
  "Adding inappropriate ictus marks",
  "Removing appropriate ictus marks",
  "Adding a swing rhythm to 'Qui habitat'",
  "Adding a swing rhythm to 'Requiem aeternam'",
  "Adding a hiphop beat to 'In paradisum'",
  "Replacing all the choir robes with pink",
  "Sneaking into the Vatican and changing all the choir robes to pink",
  "Sneaking into the Vatican and changing all the choir robes to pink while singing 'In paradisum'",
  "Sneaking 'Canada' into the O Antiphon sequence",
  "Replacing all the choir robes with pantsuits",
  "Sneaking pollen into the incense",
  "Blocking both ends of the otherwise empty pew",
  "Adding bunny ears to the artwork on the hymnals",
  "Intoning a random Mass part you hadn't prepared"
];

// Populate verb list
const verbsList = document.getElementById("verbsList");
VERBS.forEach(v => {
  const d = document.createElement("div");
  d.className = "verb";
  d.textContent = v;
  verbsList.appendChild(d);
});

let targetArg = "";
let modeArg = "";

function updateCmd() {
  const args = [targetArg, modeArg].filter(Boolean).join(" ");
  const cmd = args ? `${BASE} - ${args}` : BASE;
  document.getElementById("cmd").textContent = cmd;
}
updateCmd();

document.querySelectorAll("[data-target]").forEach(btn => {
  btn.addEventListener("click", () => {
    targetArg = btn.dataset.target;
    document.querySelectorAll("[data-target]").forEach(b => b.classList.remove("on"));
    btn.classList.add("on");
    updateCmd();
  });
});

document.querySelectorAll("[data-mode]").forEach(btn => {
  btn.addEventListener("click", () => {
    modeArg = btn.dataset.mode;
    document.querySelectorAll("[data-mode]").forEach(b => b.classList.remove("on"));
    btn.classList.add("on");
    updateCmd();
  });
});

document.getElementById("copyBtn").addEventListener("click", () => {
  const text = document.getElementById("cmd").textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById("copyBtn");
    btn.textContent = "Copied!";
    btn.classList.add("done");
    setTimeout(() => { btn.textContent = "Copy"; btn.classList.remove("done"); }, 1800);
  });
});
</script>
</body>
</html>
