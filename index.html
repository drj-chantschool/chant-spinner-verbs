<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chant Spinner Verbs for Claude Code</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      min-height: 100vh;
      padding: 2.5rem 1rem;
    }

    .container { max-width: 600px; margin: 0 auto; }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      color: #fff;
      margin-bottom: 0.3rem;
    }

    .sub {
      font-size: 0.88rem;
      color: #555;
      margin-bottom: 2.5rem;
    }

    /* ── Verb list ── */
    .verbs-header {
      display: flex;
      align-items: baseline;
      gap: 0.75rem;
      margin-bottom: 0.5rem;
    }

    .verbs-label {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #555;
    }

    .count { font-size: 0.78rem; color: #444; }

    .tiny-btn {
      font-size: 0.72rem;
      padding: 0.15rem 0.5rem;
      background: transparent;
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      color: #555;
      cursor: pointer;
      transition: color 0.1s, border-color 0.1s;
    }
    .tiny-btn:hover { color: #999; border-color: #444; }

    .verbs-list {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      margin-bottom: 2rem;
    }

    .verb-item {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      padding: 0.38rem 0.55rem;
      background: #161616;
      border: 1px solid #222;
      border-radius: 5px;
      cursor: pointer;
      user-select: none;
      transition: background 0.1s, border-color 0.1s;
    }
    .verb-item:hover { background: #1c1c1c; }
    .verb-item.on { background: #1a1730; border-color: #5b3fd4; }

    .verb-item input[type="checkbox"] {
      accent-color: #6d4aff;
      width: 13px; height: 13px;
      flex-shrink: 0;
      cursor: pointer;
      pointer-events: none;
    }

    .verb-text { font-size: 0.87rem; color: #bbb; }
    .verb-item.on .verb-text { color: #ddd; }

    /* ── Mode toggle ── */
    .mode-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }

    .mode-label { font-size: 0.78rem; color: #555; }

    .mode-btn {
      font-size: 0.78rem;
      padding: 0.28rem 0.75rem;
      background: #161616;
      border: 1px solid #2a2a2a;
      border-radius: 5px;
      color: #666;
      cursor: pointer;
      transition: all 0.1s;
    }
    .mode-btn:hover { color: #aaa; border-color: #3a3a3a; }
    .mode-btn.on { background: #1a1730; border-color: #5b3fd4; color: #b09ef5; }

    /* ── Action buttons ── */
    .actions { display: flex; gap: 0.65rem; flex-wrap: wrap; }

    .action-btn {
      flex: 1;
      min-width: 130px;
      padding: 0.7rem 1rem;
      background: #1a1730;
      border: 1px solid #5b3fd4;
      border-radius: 8px;
      color: #c4b5fd;
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
    }
    .action-btn:hover { background: #231e40; border-color: #7c5ff0; color: #ddd3ff; }
    .action-btn.done { background: #0d2e22; border-color: #059669; color: #6ee7b7; }
  </style>
</head>
<body>
<div class="container">
  <h1>Chant Spinner Verbs</h1>
  <p class="sub">Custom Claude Code spinner verbs for the sacred chant musician.</p>

  <div class="verbs-header">
    <span class="verbs-label">Verbs</span>
    <span class="count" id="count"></span>
    <button class="tiny-btn" id="selAll">all</button>
    <button class="tiny-btn" id="selNone">none</button>
  </div>

  <div class="verbs-list" id="verbsList"></div>

  <div class="mode-row">
    <span class="mode-label">Mode:</span>
    <button class="mode-btn on" id="modeReplace" data-mode="replace">Replace defaults</button>
    <button class="mode-btn" id="modeAppend" data-mode="append">Append to defaults</button>
  </div>

  <div class="actions">
    <button class="action-btn" id="btnVSCode">Copy for VSCode</button>
    <button class="action-btn" id="btnSettings">Copy for settings.json</button>
    <button class="action-btn" id="btnLocal">Copy for settings.local.json</button>
  </div>
</div>

<script>
const VERBS = [
  "Removing the flats from all the O Antiphons",
  "Putting flats in all the O Antiphons",
  "Reading the antiphon you were supposed to be singing",
  "Singing the diamond notes too quickly",
  "Singing the diamond notes too slowly",
  "Singing the diamond notes at the right speed",
  "Arguing with the ccwatershed guy about how to sing the diamond notes",
  "Adding inappropriate ictus marks",
  "Removing appropriate ictus marks",
  "Adding a swing rhythm to 'Qui habitat'",
  "Adding a swing rhythm to 'Requiem aeternam'",
  "Adding a hiphop beat to 'In paradisum'",
  "Replacing all the choir robes with pink",
  "Sneaking into the Vatican and changing all the choir robes to pink",
  "Sneaking into the Vatican and changing all the choir robes to pink while singing 'In paradisum'",
  "Sneaking 'Canada' into the O Antiphon sequence",
  "Replacing all the choir robes with pantsuits",
  "Sneaking pollen into the incense",
  "Blocking both ends of the otherwise empty pew",
  "Adding bunny ears to the artwork on the hymnals",
  "Intoning a random Mass part you hadn't prepared"
];

let selected = new Set(VERBS.map((_, i) => i));
let mode = "replace";

// Build list
const list = document.getElementById("verbsList");
VERBS.forEach((verb, i) => {
  const item = document.createElement("div");
  item.className = "verb-item on";
  const cb = document.createElement("input");
  cb.type = "checkbox"; cb.checked = true;
  const span = document.createElement("span");
  span.className = "verb-text";
  span.textContent = verb;
  item.append(cb, span);
  item.addEventListener("click", () => {
    if (selected.has(i)) { selected.delete(i); item.classList.remove("on"); cb.checked = false; }
    else                  { selected.add(i);    item.classList.add("on");    cb.checked = true;  }
    updateCount();
  });
  list.appendChild(item);
});

function updateCount() {
  document.getElementById("count").textContent = `${selected.size} / ${VERBS.length}`;
}
updateCount();

document.getElementById("selAll").addEventListener("click", () => {
  VERBS.forEach((_, i) => selected.add(i));
  list.querySelectorAll(".verb-item").forEach(el => { el.classList.add("on"); el.querySelector("input").checked = true; });
  updateCount();
});
document.getElementById("selNone").addEventListener("click", () => {
  selected.clear();
  list.querySelectorAll(".verb-item").forEach(el => { el.classList.remove("on"); el.querySelector("input").checked = false; });
  updateCount();
});

// Mode
document.querySelectorAll("[data-mode]").forEach(btn => {
  btn.addEventListener("click", () => {
    mode = btn.dataset.mode;
    document.querySelectorAll("[data-mode]").forEach(b => b.classList.remove("on"));
    btn.classList.add("on");
  });
});

function buildJSON() {
  const verbs = VERBS.filter((_, i) => selected.has(i));
  return JSON.stringify({ "claudeCode.spinnerVerbs": { mode, verbs } }, null, 2);
}

function flash(btn, label) {
  const orig = btn.textContent;
  btn.textContent = "Copied!";
  btn.classList.add("done");
  setTimeout(() => { btn.textContent = orig; btn.classList.remove("done"); }, 1800);
}

function copyFor(btn) {
  navigator.clipboard.writeText(buildJSON()).then(() => flash(btn));
}

document.getElementById("btnVSCode").addEventListener("click",    e => copyFor(e.currentTarget));
document.getElementById("btnSettings").addEventListener("click",  e => copyFor(e.currentTarget));
document.getElementById("btnLocal").addEventListener("click",     e => copyFor(e.currentTarget));
</script>
</body>
</html>
